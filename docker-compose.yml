services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    environment:
      RAILS_ENV: development
      EDITING_ENABLED: false
      # Object storage is provider-agnostic: the app, imgproxy and the device
      # bundle all derive everything from S3_URL + AWS_REGION + S3_BUCKET. In dev
      # minio is the S3-compatible stand-in for Wasabi (the prod provider); in
      # prod these point at https://s3.<region>.wasabisys.com / eu-west-1.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_URL: 'http://minio:9000'
      S3_BUCKET: ${S3_BUCKET:-opendig}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_URL: ${IMGPROXY_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    ports:
      - 3000:3000
      - 3001:3001
    volumes:
      - .:/app
    depends_on:
      - db
      - minio
      - imgproxy
      - redis
    # Self-heal when the image predates a newly-added gem (e.g. after the Gemfile
    # changes and the container is recreated): install only if something's missing,
    # otherwise boot straight up.
    command: sh -c "bundle check || bundle install; bin/rails server -b 0.0.0.0 -p 3000"
    platform: linux/amd64
  db:
    image: couchdb:latest
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - 5984:5984
    volumes:
      - ./couchdb-data:/opt/couchdb/data

  # Dev S3-compatible object store, standing in for Wasabi in production. The app
  # talks to it purely via S3_URL, so swapping providers is config, not code.
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z # pinned here as later versiosn require CLI only interaction
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - ./minio-data:/data

  imgproxy:
    image: darthsim/imgproxy:latest
    ports:
      - 8080:8080
    environment:
      IMGPROXY_USE_S3: true
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_MAX_SRC_RESOLUTION: 100
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

  redis:
    image: redis:latest
    ports:
      - 6379:6379
