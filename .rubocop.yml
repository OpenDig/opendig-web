Style/FrozenStringLiteralComment:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - spec/**/*
    - config/**/*
    - lib/tasks/**/* # rake task DSL blocks are naturally long

# Class/module doc comments are not enforced in this codebase.
Style/Documentation:
  Enabled: false

Metrics/ModuleLength:
  Exclude:
    - app/**/*

Metrics/ClassLength:
  Exclude:
    - app/**/*
    - config/initializers/*

Metrics/AbcSize:
  Exclude:
    - app/controllers/*
    - app/models/*
    - app/helpers/*
    - config/initializers/*
Metrics/MethodLength:
  Exclude:
    - app/controllers/*
    - app/models/*
    - app/helpers/*
    - config/initializers/*
Metrics/PerceivedComplexity:
  Exclude:
    - app/controllers/*
Metrics/CyclomaticComplexity:
  Exclude:
    - app/controllers/*
inherit_from: .rubocop_todo.yml

require:
  - rubocop-rspec
  - rubocop-rails
  - rubocop-rspec_rails
  - rubocop-capybara

AllCops:
  NewCops: enable

# Offenses that `rubocop --auto-gen-config` doesn't pick up on for some reason
Layout/FirstArrayElementIndentation:
  Exclude:
    - 'app/models/data_digger.rb'
